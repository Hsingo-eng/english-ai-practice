<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給捲捲的英文練習助手</title>
    
        <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="logo.png" alt="Logo" class="header-logo">
            <h1>給捲捲的英文練習助手</h1>
        </div>
    </header>

    <div class="container">
        <div id="mode-buttons">
            <button id="btn-daily_qa" class="active" onclick="changeMode('daily_qa')">💬 日常問答</button>
            <button id="btn-opinion" onclick="changeMode('opinion')">💡 發表觀點</button>
            <button id="btn-engineer_interview" onclick="changeMode('engineer_interview')">💻 模擬面試問答</button>
        </div>

        <div class="question-container">
            <button id="generate-btn" onclick="generateQuestion()">請 AI 出題</button>
            <div id="questionDisplay">請先選擇模式，然後點擊「請 AI 出題」獲取題目</div>
        </div>

        <div class="input-box">
            <textarea id="user-input" rows="4" placeholder="請在此輸入你的完整英文回答"></textarea>
            <button id="submit-btn">送出批改</button>
        </div>

        <div id="result-box" class="result-box hidden">
            <h3>AI 批改結果：</h3>
            <div class="corrected-block">
                <p><strong>正確句子：</strong> <span id="corrected-text"></span></p>
                <button id="speak-btn">🔊 朗讀句子</button>
            </div>
            <div class="explanation-block">
                <p><strong>詳細說明：</strong> <span id="explanation-text"></span></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
