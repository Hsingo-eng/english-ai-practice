<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給捲捲的 英文練習助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>給捲捲的 英文練習助手</h1>

        <div id="mode-buttons">
            <button onclick="generateQuestion('daily_qa')">💬 日常問答</button>
            
            <button onclick="generateQuestion('opinion')">💡 發表觀點</button>
            
            <button onclick="generateQuestion('engineer_interview')">💻 模擬面試問答</button>
        </div>

        <div id="questionDisplay">請點擊上方按鈕產生題目</div>

        <div class="topic-box">
            <button id="get-topic-btn">請 AI 出題</button>
            <p id="topic-display">點擊上方按鈕獲取題目...</p>
        </div>

        <div class="input-box">
            <textarea id="user-input" rows="4" placeholder="請在此輸入你的完整英文回答..."></textarea>
            <button id="submit-btn">送出批改</button>
        </div>

        <div id="result-box" class="result-box hidden">
            <h3>AI 批改結果：</h3>
            <div class="corrected-block">
                <p><strong>正確句子：</strong> <span id="corrected-text"></span></p>
                <button id="speak-btn">🔊 朗讀句子</button>
            </div>
            <div class="explanation-block">
                <p><strong>詳細說明：</strong> <span id="explanation-text"></span></p>
            </div>
        </div>
        <div id="mode-buttons">
            <button id="btn-daily_qa" onclick="generateQuestion('daily_qa')">💬 日常問答</button>
            <button id="btn-opinion" onclick="generateQuestion('opinion')">💡 發表觀點</button>
            <button id="btn-engineer_interview" onclick="generateQuestion('engineer_interview')">💻 工程師面試</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
